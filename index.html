<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad Barrial Application</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2E2E2E;
            color: #FFCCCB;
        }
        #map {
            height: 400px;
            width: 100%;
            border: 2px solid #FFCCCB;
        }
        .form-group {
            margin: 20px 0;
        }
        button {
            background-color: #FF5733;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
        }
        button:hover {
            background-color: #C70039;
        }
    </style>
</head>
<body>
    <h1>Seguridad Barrial</h1>
    <div id="map"></div>
    <p id="coordinates">Coordinates: </p>
    <form id="reportForm">
        <div class="form-group">
            <label for="problemType">Tipo de Problema:</label>
            <input type="text" id="problemType" required>
        </div>
        <div class="form-group">
            <label for="frequency">Frecuencia:</label>
            <input type="number" id="frequency" min="1" required>
        </div>
        <div class="form-group">
            <label for="description">Descripción:</label>
            <textarea id="description" required></textarea>
        </div>
        <button type="submit">Reportar</button>
    </form>
    <div id="reportCards"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([5.8268, -73.0333], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        let marker;
        map.on('click', function(e) {
            const coords = e.latlng;
            if (marker) {
                marker.setLatLng(coords);
            } else {
                marker = L.marker(coords).addTo(map);
            }
            document.getElementById('coordinates').textContent = `Coordinates: ${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)}`;
        });

        const reportForm = document.getElementById('reportForm');
        reportForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const problemType = document.getElementById('problemType').value;
            const frequency = document.getElementById('frequency').value;
            const description = document.getElementById('description').value;
            const card = `<div><h2>${problemType}</h2><p>Frequency: ${frequency}</p><p>${description}</p></div>`;
            document.getElementById('reportCards').insertAdjacentHTML('beforeend', card);
            localStorage.setItem('reports', document.getElementById('reportCards').innerHTML);
        });

        window.onload = function() {
            const savedReports = localStorage.getItem('reports');
            if (savedReports) {
                document.getElementById('reportCards').innerHTML = savedReports;
            }
        };
    </script>
</body>
</html>
